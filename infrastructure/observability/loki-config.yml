auth_enabled: false

server:
  http_listen_port: 3100

limits_config:
  allow_structured_metadata: false

common:
  path_prefix: /loki
  replication_factor: 1

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/cache
  filesystem:
    directory: /loki/chunks

# 🔥 THIS IS THE FIX (disable distributed components)
ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory   # ❗ instead of consul
      replication_factor: 1

query_scheduler:
  max_outstanding_requests_per_tenant: 2048

frontend:
  scheduler_address: ""   # ❗ disable scheduler