version: "3.8"

services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    networks:
      - observability
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    networks:
      - observability
    volumes:
      - /home/nadeem-shahzad/EventX/services:/var/log/eventx
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - observability
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus-config.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d # keep 15 days of metrics
      - --web.enable-lifecycle # allow hot reload
    depends_on:
      - loki

  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway
    ports:
      - "9091:9091"
    networks:
      - observability

  # --- NEW: Grafana Tempo (Trace Database) ---
  tempo:
    image: grafana/tempo:2.10.0  # <-- NO MORE 'latest'!
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    ports:
      - "3200:3200" # Grafana UI reads from here
      - "4317:4317" # OTel Collector writes to here (gRPC)
    networks:
      - observability
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo

  # --- NEW: OpenTelemetry Collector (The Router) ---
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4318:4318" # NestJS sends traces here via HTTP
    networks:
      - observability
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    depends_on:
      - tempo

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    networks:
      - observability
    depends_on:
      - loki
      - prometheus
      - tempo # Added Tempo dependency
    volumes:
      - grafana-data:/var/lib/grafana

networks:
  observability:
    driver: bridge

volumes:
  loki-data:
  prometheus-data:
  grafana-data:
  tempo-data: # --- NEW: Volume for trace persistence ---