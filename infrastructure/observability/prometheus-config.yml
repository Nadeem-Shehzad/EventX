global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: eventx-services
    metrics_path: /v1/metrics
    static_configs:
      - targets:
          - 192.168.56.101:3002   # identity-service
          #- 192.168.56.101:3003  # booking-service
          #- 192.168.56.101:3000  # catalog-service
        labels:
          group: eventx

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: promtail
    static_configs:
      - targets:
          - promtail:9080