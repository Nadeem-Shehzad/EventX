global:
  scrape_interval: 15s         # scrape every 15 seconds
  evaluation_interval: 15s

scrape_configs:

  # Prometheus scrapes itself
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # Scrape all EventX NestJS services
  - job_name: eventx-services
    static_configs:
      - targets:
          - host.docker.internal:3002   # identity-service
          #- host.docker.internal:3002   # booking-service
          #- host.docker.internal:3000   # catalog-service
        labels:
          group: eventx

  # Scrape Loki metrics
  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  # Scrape Promtail metrics
  - job_name: promtail
    static_configs:
      - targets:
          - promtail:9080